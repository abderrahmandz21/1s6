<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>قسم 1 علمي 6</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      direction: rtl;
      background: #f4f6f9;
      text-align: center;
    }

    header {
      background: #004080;
      color: white;
      padding: 20px;
    }

    .container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      margin: 30px;
      gap: 20px;
    }

    .card {
      background: white;
      width: 250px;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      background: #eef4ff;
    }

    .icon {
      font-size: 50px;
      margin-bottom: 15px;
    }

    .section {
      display: none;
      margin: 20px auto;
      width: 80%;
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    input {
      padding: 10px;
      margin: 10px;
      width: 120px;
    }

    button {
      padding: 10px 20px;
      background: #004080;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #0059b3;
    }
  </style>
</head>
<body>

<header>
  <h1>موقع قسم 1 علمي 6</h1>
  <p>الدروس والواجبات وحساب المعدل</p>
</header>

<div class="container">
  <div class="card" onclick="showSection('grades')">
    <div class="icon">📊</div>
    <h2>حساب المعدل</h2>
  </div>

  <div class="card" onclick="showSection('lessons')">
    <div class="icon">📚</div>
    <h2>الدروس</h2>
  </div>

  <div class="card" onclick="showSection('homework')">
    <div class="icon">📝</div>
    <h2>الواجبات</h2>
  </div>
</div>

<div id="grades" class="section">
  <h2>حساب المعدل</h2>
  <input type="number" id="mark1" placeholder="العلامة 1">
  <input type="number" id="mark2" placeholder="العلامة 2">
  <input type="number" id="mark3" placeholder="العلامة 3">
  <br>
  <button onclick="calculateAverage()">احسب المعدل</button>
  <h3 id="result"></h3>
</div>

<div id="lessons" class="section">
  <h2>الدروس</h2>
  <p>هنا ستضع روابط الدروس أو ملفات PDF الخاصة بالقسم.</p>
</div>

<div id="homework" class="section">
  <h2>الواجبات</h2>
  <p>هنا ستضع الواجبات والتمارين المطلوبة من التلاميذ.</p>
</div>

<script>
function showSection(sectionId) {
  let sections = document.querySelectorAll('.section');
  sections.forEach(sec => sec.style.display = 'none');
  document.getElementById(sectionId).style.display = 'block';
}

function calculateAverage() {
  let m1 = parseFloat(document.getElementById("mark1").value) || 0;
  let m2 = parseFloat(document.getElementById("mark2").value) || 0;
  let m3 = parseFloat(document.getElementById("mark3").value) || 0;

  let avg = (m1 + m2 + m3) / 3;
  document.getElementById("result").innerText = "المعدل: " + avg.toFixed(2);
}
</script>

</body>
</html>
