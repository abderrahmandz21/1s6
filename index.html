<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>2MT1</title>

<style>
body {
    font-family: Arial;
    background: black;
    color: white;
    text-align: center;
}
h1 {
    font-size: 40px;
    font-weight: bold;
}
button {
    padding: 10px;
    margin: 5px;
    cursor: pointer;
}
.section {
    display: none;
}
</style>
</head>

<body>

<script>
// 🔒 PASSWORD
let pass = prompt("ادخل كلمة السر:");
if(pass !== "jsar"){
    alert("كلمة السر خاطئة");
    document.body.innerHTML = "";
}
</script>

<h1>2MT1</h1>

<button onclick="show('teachers')">الاساتذة</button>
<button onclick="show('students')">التلاميذ</button>
<button onclick="show('grades')">المعدلات</button>
<button onclick="show('calc')">حساب المعدل</button>
<button onclick="show('lessons')">الدروس</button>

<!-- 🔵 TEACHERS -->
<div id="teachers" class="section">
<h2>الاساتذة</h2>
<button onclick="addTeacher()">اضافة استاذ</button>
<div id="teacherList"></div>
</div>

<!-- 🔵 STUDENTS -->
<div id="students" class="section">
<h2>التلاميذ</h2>
<button onclick="addStudent()">اضافة تلميذ</button>
<div id="studentList"></div>
</div>

<!-- 🔵 GRADES -->
<div id="grades" class="section">
<h2>المعدلات</h2>
<div id="gradesList"></div>
</div>

<!-- 🔵 CALCULATOR -->
<div id="calc" class="section">
<h2>حساب المعدل</h2>

<input id="c" placeholder="التقويم /20"><br>
<input id="d" placeholder="الفرض /20"><br>
<input id="e" placeholder="الاختبار /20"><br>
<input id="coef" placeholder="المعامل"><br>

<button onclick="calc()">احسب</button>
<p id="result"></p>

</div>

<!-- 🔵 LESSONS -->
<div id="lessons" class="section">
<h2>الدروس</h2>
<input id="lessonName" placeholder="اسم الدرس"><br>
<input type="file" id="lessonImg"><br>
<button onclick="addLesson()">اضافة درس</button>

<div id="lessonList"></div>
</div>

<script>

// 🔄 NAVIGATION
function show(id){
    document.querySelectorAll('.section').forEach(s => s.style.display="none");
    document.getElementById(id).style.display="block";
}

// 💾 STORAGE
function save(key,data){
    localStorage.setItem(key, JSON.stringify(data));
}
function load(key){
    return JSON.parse(localStorage.getItem(key)) || [];
}

// 👨‍🏫 TEACHERS
function addTeacher(){
    let name = prompt("اسم الاستاذ");
    let subject = prompt("المادة");
    let teachers = load("teachers");

    teachers.push({name,subject});
    save("teachers",teachers);
    displayTeachers();
}

function displayTeachers(){
    let teachers = load("teachers");
    let html="";
    teachers.forEach((t,i)=>{
        html+=`<p>${t.name} - ${t.subject}
        <button onclick="editTeacher(${i})">تعديل</button></p>`;
    });
    document.getElementById("teacherList").innerHTML=html;
}

function editTeacher(i){
    let teachers = load("teachers");
    teachers[i].name = prompt("اسم جديد");
    teachers[i].subject = prompt("مادة جديدة");
    save("teachers",teachers);
    displayTeachers();
}

// 👨‍🎓 STUDENTS
function addStudent(){
    let name = prompt("الاسم");
    let gmail = prompt("gmail");
    let phone = prompt("الهاتف (اختياري)");
    let meta = prompt("حساب meta");

    let students = load("students");
    students.push({name,gmail,phone,meta});
    save("students",students);
    displayStudents();
}

function displayStudents(){
    let students = load("students");
    let html="";
    students.forEach(s=>{
        html+=`<p>${s.name} - ${s.gmail}</p>`;
    });
    document.getElementById("studentList").innerHTML=html;
}

// 📊 CALC
function calc(){
    let c = parseFloat(document.getElementById("c").value);
    let d = parseFloat(document.getElementById("d").value);
    let e = parseFloat(document.getElementById("e").value);
    let coef = parseFloat(document.getElementById("coef").value);

    if(c>20||d>20||e>20){
        alert("القيم يجب ان تكون /20");
        return;
    }

    let result = ((c + d + e) / 3) * coef;
    document.getElementById("result").innerText = "المعدل: " + result.toFixed(2);
}

// 📚 LESSONS
function addLesson(){
    let name = document.getElementById("lessonName").value;
    let file = document.getElementById("lessonImg").files[0];

    let reader = new FileReader();
    reader.onload = function(){
        let lessons = load("lessons");
        lessons.push({name,img:reader.result});
        save("lessons",lessons);
        displayLessons();
    }
    reader.readAsDataURL(file);
}

function displayLessons(){
    let lessons = load("lessons");
    let html="";
    lessons.forEach(l=>{
        html+=`<p>${l.name}</p><img src="${l.img}" width="200">`;
    });
    document.getElementById("lessonList").innerHTML=html;
}

// INIT
displayTeachers();
displayStudents();
displayLessons();

</script>

</body>
</html>
